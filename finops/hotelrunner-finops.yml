description: >-
  FinOps view of HotelRunner spend. HotelRunner is sold as a per-property SaaS
  subscription with a minimum monthly flat fee plus, on Essential-tier plans, a
  percentage of monthly realized booking revenue across all connected channels.
  There is no separate charge for Custom Apps API usage - the API is a delivery
  mechanism for the subscribed product, not a metered line item. Advanced and
  Elite tiers are custom-quoted annual/contract pricing. The dominant real cost
  driver for a multi-property operator is the number of subscribed properties
  and each property's plan tier and booking volume, not API call volume.
notes: >-
  Percentage-of-revenue components are not reconciled to exact dollar amounts
  here since they scale with each property's booking revenue; verify current
  published rates on HotelRunner's pricing page and confirm Advanced/Elite
  quotes directly with HotelRunner sales.
